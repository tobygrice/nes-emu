name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

env:
  APP_NAME: nesemu

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
  
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes

  build_and_upload:
    needs: create_release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            ext: tar.gz
          - os: macos-latest
            label: macos
            ext: tar.gz
          - os: windows-latest
            label: windows-x64
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libpulse-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            wayland-protocols \
            xorg-dev

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_RUNTIME_OUTPUT_DIRECTORY=${{ github.workspace }}/build
          -DCMAKE_RUNTIME_OUTPUT_DIRECTORY_RELEASE=${{ github.workspace }}/build

      - name: Build
        run: cmake --build build --config Release --target nesemu --parallel

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin_path=""
          for candidate in "build/${APP_NAME}" "build/Release/${APP_NAME}"; do
            if [[ -f "$candidate" ]]; then
              bin_path="$candidate"
              break
            fi
          done
          if [[ -z "$bin_path" ]]; then
            echo "Could not find built executable '${APP_NAME}' under build/"
            find build -maxdepth 3 -type f -name "${APP_NAME}" -print
            exit 1
          fi

          archive="${APP_NAME}-${GITHUB_REF_NAME}-${{ matrix.label }}.tar.gz"
          tar -C "$(dirname "$bin_path")" -czf "$archive" "$(basename "$bin_path")"
          echo "ASSET=$archive" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exePath = @(
            "build/${env:APP_NAME}.exe",
            "build/Release/${env:APP_NAME}.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exePath) {
            Write-Error "Could not find built executable '${env:APP_NAME}.exe' under build/"
            Get-ChildItem -Path build -Recurse -File -Filter "${env:APP_NAME}.exe"
            exit 1
          }

          $archive = "${env:APP_NAME}-${env:GITHUB_REF_NAME}-${{ matrix.label }}.zip"
          Compress-Archive -Path $exePath -DestinationPath $archive -Force
          "ASSET=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload asset to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ env.ASSET }}" --clobber
