name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: nes_emu

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
  
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes

  build_and_upload:
    needs: create_release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            ext: tar.gz
          - os: macos-latest
            label: macos
            ext: tar.gz
          - os: windows-latest
            label: windows-x64
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_RUNTIME_OUTPUT_DIRECTORY=${{ github.workspace }}/build
          -DCMAKE_RUNTIME_OUTPUT_DIRECTORY_RELEASE=${{ github.workspace }}/build

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="${APP_NAME}-${GITHUB_REF_NAME}-${{ matrix.label }}.tar.gz"
          tar -C build -czf "$archive" "$APP_NAME"
          echo "ASSET=$archive" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "${env:APP_NAME}-${env:GITHUB_REF_NAME}-${{ matrix.label }}.zip"
          Compress-Archive -Path "build/${env:APP_NAME}.exe" -DestinationPath $archive -Force
          "ASSET=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload asset to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ env.ASSET }}" --clobber
